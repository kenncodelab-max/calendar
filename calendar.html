<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar Widget</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: transparent;
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
  }

  .widget {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 8px 16px 10px;
  }

  .header-row {
    display: flex;
    align-items: baseline;
    gap: 5px;
  }

  .day-label {
    font-size: 19px;
    font-weight: 600;
    color: #FF3B30;
    letter-spacing: -0.2px;
  }

  .month-label {
    font-size: 19px;
    font-weight: 400;
    color: #8E8E93;
    letter-spacing: -0.2px;
  }

  .date-number {
    font-size: 78px;
    font-weight: 700;
    color: #1C1C1E;
    letter-spacing: -4px;
    line-height: 1;
  }

  .time-label {
    font-size: 12px;
    font-weight: 400;
    color: #8E8E93;
    margin-top: 2px;
  }
</style>
</head>
<body>
<div class="widget">
  <div class="header-row">
    <span class="day-label" id="day-name"></span>
    <span class="month-label" id="month-name"></span>
  </div>
  <div class="date-number" id="date-num"></div>
  <div class="time-label" id="time-display"></div>
</div>
<script>
  const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  function update() {
    const now = new Date();
    document.getElementById('day-name').textContent = DAYS[now.getDay()];
    document.getElementById('month-name').textContent = MONTHS[now.getMonth()];
    document.getElementById('date-num').textContent = now.getDate();
    let h = now.getHours();
    const m = now.getMinutes().toString().padStart(2, '0');
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    document.getElementById('time-display').textContent = `${h}:${m} ${ampm}`;
  }

  update();
  setInterval(update, 1000);
</script>
</body>
</html>
