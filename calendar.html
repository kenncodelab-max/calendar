<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Widgets</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: #191919;
    width: 100%;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
  }

  .wrapper {
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 20px;
    width: 100%;
    height: 100%;
  }

  .card {
    height: 100%;
    max-height: 155px;
    border-radius: clamp(20px, 4vw, 36px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow:
      0 4px 6px rgba(0,0,0,0.2),
      0 12px 28px rgba(0,0,0,0.4),
      0 32px 56px rgba(0,0,0,0.3);
    flex-shrink: 0;
  }

  /* ── calendar ── */
  .cal {
    background: #ffffff;
    aspect-ratio: 1 / 1;
    padding-top: 4px;
  }

  .cal .header-row {
    display: flex;
    align-items: baseline;
    gap: 4px;
  }

  .cal .day-label {
    font-size: clamp(12px, 2vw, 18px);
    font-weight: 600;
    color: #FF3B30;
  }

  .cal .month-label {
    font-size: clamp(12px, 2vw, 18px);
    font-weight: 400;
    color: #8E8E93;
  }

  .cal .date-number {
    font-size: clamp(48px, 10vw, 80px);
    font-weight: 700;
    color: #1C1C1E;
    letter-spacing: -4px;
    line-height: 0.95;
    margin-top: 2px;
  }

  /* ── clock ── */
  .clk {
    background: #ffffff;
    aspect-ratio: 2 / 1;
    padding: 0 20px;
  }

  .clk .time-row {
    display: flex;
    align-items: baseline;
    gap: 0;
  }

  .clk .time-main {
    font-size: clamp(36px, 7vw, 68px);
    font-weight: 300;
    color: #1C1C1E;
    letter-spacing: -2px;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }

  .clk .colon {
    font-size: clamp(36px, 7vw, 68px);
    font-weight: 300;
    color: #1C1C1E;
    line-height: 1;
    margin: 0 1px;
    animation: blink 1s step-start infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  .clk .seconds {
    font-size: clamp(18px, 3.5vw, 34px);
    font-weight: 300;
    color: #8E8E93;
    letter-spacing: -1px;
    align-self: flex-end;
    margin-bottom: clamp(3px, 0.8vw, 7px);
    margin-left: 3px;
    font-variant-numeric: tabular-nums;
  }

  .clk .ampm {
    font-size: clamp(11px, 1.8vw, 20px);
    font-weight: 500;
    color: #1C1C1E;
    align-self: flex-end;
    margin-bottom: clamp(5px, 1vw, 9px);
    margin-left: 5px;
  }

  .clk .date-row {
    font-size: clamp(10px, 1.5vw, 14px);
    font-weight: 400;
    color: #8E8E93;
    margin-top: 4px;
    white-space: nowrap;
  }
</style>
</head>
<body>
<div class="wrapper">

  <!-- Calendar -->
  <div class="card cal">
    <div class="header-row">
      <span class="day-label" id="cal-day"></span>
      <span class="month-label" id="cal-month"></span>
    </div>
    <div class="date-number" id="cal-date"></div>
  </div>

  <!-- Clock -->
  <div class="card clk">
    <div class="time-row">
      <span class="time-main" id="clk-h"></span>
      <span class="colon">:</span>
      <span class="time-main" id="clk-m"></span>
      <span class="colon" style="animation:none;opacity:1;">:</span>
      <span class="seconds" id="clk-s"></span>
      <span class="ampm" id="clk-ampm"></span>
    </div>
    <div class="date-row" id="clk-date"></div>
  </div>

</div>
<script>
  const DAYS_SHORT   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const DAYS_LONG    = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const MONTHS_LONG  = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  function update() {
    const now = new Date();
    const d  = now.getDay();
    const mo = now.getMonth();
    const dt = now.getDate();
    let h    = now.getHours();
    const m  = now.getMinutes().toString().padStart(2,'0');
    const s  = now.getSeconds().toString().padStart(2,'0');
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;

    document.getElementById('cal-day').textContent   = DAYS_SHORT[d];
    document.getElementById('cal-month').textContent = MONTHS_SHORT[mo];
    document.getElementById('cal-date').textContent  = dt;

    document.getElementById('clk-h').textContent    = h;
    document.getElementById('clk-m').textContent    = m;
    document.getElementById('clk-s').textContent    = s;
    document.getElementById('clk-ampm').textContent = ampm;
    document.getElementById('clk-date').textContent = `${DAYS_LONG[d]}, ${MONTHS_LONG[mo]} ${dt}`;
  }

  update();
  setInterval(update, 1000);
</script>
</body>
</html>
