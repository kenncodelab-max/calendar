<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Widgets</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: #191919;
    width: 100%;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
  }

  .outer {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 18px;
    padding: 24px;
    width: 100%;
  }

  /* ── greeting ── */
  .greeting-label {
    font-size: 11px;
    font-weight: 500;
    color: #FF3B30;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    margin-bottom: 5px;
    opacity: 0;
    animation: fadeUp 0.5s ease forwards 0.1s;
  }
  .greeting-text {
    font-size: clamp(16px, 2.5vw, 26px);
    font-weight: 300;
    color: #ffffff;
    letter-spacing: -0.2px;
    line-height: 1.3;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.3s;
  }
  .greeting-sub {
    font-size: clamp(11px, 1.4vw, 13px);
    font-weight: 400;
    color: #636366;
    margin-top: 5px;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards 0.5s;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── cards row ── */
  .row {
    display: flex;
    flex-direction: row;
    align-items: stretch;
    gap: 14px;
    width: 100%;
  }

  .card {
    background: #ffffff;
    border-radius: 28px;
    box-shadow:
      0 4px 6px rgba(0,0,0,0.15),
      0 12px 28px rgba(0,0,0,0.35),
      0 32px 56px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* calendar = square */
  .cal {
    width: 155px;
    min-width: 155px;
    height: 155px;
    padding-top: 4px;
  }
  .cal .header-row   { display: flex; align-items: baseline; gap: 4px; }
  .cal .day-label    { font-size: 17px; font-weight: 600; color: #FF3B30; }
  .cal .month-label  { font-size: 17px; font-weight: 400; color: #8E8E93; }
  .cal .date-number  { font-size: 78px; font-weight: 700; color: #1C1C1E; letter-spacing: -5px; line-height: 0.95; margin-top: 2px; }

  /* clock = fills remaining width, same height */
  .clk {
    flex: 1;
    height: 155px;
    padding: 0 24px;
  }
  .clk .time-row  { display: flex; align-items: baseline; gap: 0; }
  .clk .time-main { font-size: 64px; font-weight: 300; color: #1C1C1E; letter-spacing: -2px; line-height: 1; font-variant-numeric: tabular-nums; }
  .clk .colon     { font-size: 64px; font-weight: 300; color: #1C1C1E; line-height: 1; margin: 0 2px; animation: blink 1s step-start infinite; }
  .clk .colon-static { animation: none !important; opacity: 1 !important; }
  .clk .seconds   { font-size: 28px; font-weight: 300; color: #8E8E93; letter-spacing: -1px; align-self: flex-end; margin-bottom: 8px; margin-left: 2px; font-variant-numeric: tabular-nums; }
  .clk .ampm      { font-size: 15px; font-weight: 600; color: #8E8E93; align-self: flex-end; margin-bottom: 10px; margin-left: 5px; letter-spacing: 0.5px; }
  .clk .date-row  { font-size: 13px; font-weight: 400; color: #8E8E93; margin-top: 5px; white-space: nowrap; }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
</style>
</head>
<body>
<div class="outer">

  <!-- Greeting -->
  <div>
    <div class="greeting-label">J.A.R.V.I.S</div>
    <div class="greeting-text" id="greeting-text"></div>
    <div class="greeting-sub" id="greeting-sub"></div>
  </div>

  <!-- Widgets -->
  <div class="row">

    <div class="card cal">
      <div class="header-row">
        <span class="day-label" id="cal-day"></span>
        <span class="month-label" id="cal-month"></span>
      </div>
      <div class="date-number" id="cal-date"></div>
    </div>

    <div class="card clk">
      <div class="time-row">
        <span class="time-main" id="clk-h"></span>
        <span class="colon">:</span>
        <span class="time-main" id="clk-m"></span>
        <span class="colon colon-static">:</span>
        <span class="seconds" id="clk-s"></span>
        <span class="ampm" id="clk-ampm"></span>
      </div>
      <div class="date-row" id="clk-date"></div>
    </div>

  </div>
</div>

<script>
  const DAYS_SHORT   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const DAYS_LONG    = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const MONTHS_LONG  = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  const GREETINGS = {
    morning:   ["Good morning, Sir. All systems are online and running at full capacity.","Good morning, Sir. Your schedule has been loaded. Shall we begin?","Good morning, Sir. I've run diagnostics — everything looks optimal.","Rise and shine, Sir. The world didn't end overnight. Productivity awaits."],
    afternoon: ["Good afternoon, Sir. Power levels nominal. What shall we tackle next?","Good afternoon, Sir. I trust the morning treated you well.","Good afternoon, Sir. Systems are stable. Ready on your command.","Good afternoon, Sir. Midday check complete — all clear."],
    evening:   ["Good evening, Sir. Another day logged. Shall I compile the summary?","Good evening, Sir. The day's metrics are looking favorable.","Good evening, Sir. Systems standing by for your final instructions.","Good evening, Sir. Winding down — but I'm still here if you need me."],
    night:     ["Still awake, Sir? I'll keep the lights on as long as you need.","Working late again, Sir. I've noted your dedication — as always.","It's late, Sir. I'm monitoring everything so you don't have to.","Burning the midnight oil, Sir? I'll make sure nothing slips through."]
  };
  const SUBS = ["All systems nominal. Standing by.","Monitoring all parameters. No anomalies detected.","Network secure. Ready for your next move.","Running at 100% efficiency, Sir.","Awaiting further instructions."];

  function getGreeting(h) {
    let pool;
    if (h >= 5 && h < 12)       pool = GREETINGS.morning;
    else if (h >= 12 && h < 17) pool = GREETINGS.afternoon;
    else if (h >= 17 && h < 21) pool = GREETINGS.evening;
    else                         pool = GREETINGS.night;
    return pool[Math.floor(Math.random() * pool.length)];
  }

  function update() {
    const now  = new Date();
    const d = now.getDay(), mo = now.getMonth(), dt = now.getDate();
    let h = now.getHours();
    const m = now.getMinutes().toString().padStart(2,'0');
    const s = now.getSeconds().toString().padStart(2,'0');
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;

    document.getElementById('cal-day').textContent   = DAYS_SHORT[d];
    document.getElementById('cal-month').textContent = MONTHS_SHORT[mo];
    document.getElementById('cal-date').textContent  = dt;
    document.getElementById('clk-h').textContent     = h;
    document.getElementById('clk-m').textContent     = m;
    document.getElementById('clk-s').textContent     = s;
    document.getElementById('clk-ampm').textContent  = ampm;
    document.getElementById('clk-date').textContent  = `${DAYS_LONG[d]}, ${MONTHS_LONG[mo]} ${dt}`;
  }

  const hour = new Date().getHours();
  document.getElementById('greeting-text').textContent = getGreeting(hour);
  document.getElementById('greeting-sub').textContent  = SUBS[Math.floor(Math.random() * SUBS.length)];

  update();
  setInterval(update, 1000);
</script>
</body>
</html>
