<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar Widget</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: #191919;
    width: 100%;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
  }

  .widget {
    width: 155px;
    height: 155px;
    background: #ffffff;
    border-radius: 36px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding-top: 4px;
    box-shadow:
      0 4px 6px rgba(0,0,0,0.15),
      0 12px 28px rgba(0,0,0,0.35),
      0 32px 56px rgba(0,0,0,0.25);
  }

  .header-row {
    display: flex;
    align-items: baseline;
    gap: 5px;
  }

  .day-label {
    font-size: 18px;
    font-weight: 600;
    color: #FF3B30;
    letter-spacing: -0.2px;
  }

  .month-label {
    font-size: 18px;
    font-weight: 400;
    color: #8E8E93;
    letter-spacing: -0.2px;
  }

  .date-number {
    font-size: 80px;
    font-weight: 700;
    color: #1C1C1E;
    letter-spacing: -5px;
    line-height: 0.95;
    margin-top: 2px;
  }
</style>
</head>
<body>
<div class="widget">
  <div class="header-row">
    <span class="day-label" id="day-name"></span>
    <span class="month-label" id="month-name"></span>
  </div>
  <div class="date-number" id="date-num"></div>
</div>
<script>
  const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  function update() {
    const now = new Date();
    document.getElementById('day-name').textContent = DAYS[now.getDay()];
    document.getElementById('month-name').textContent = MONTHS[now.getMonth()];
    document.getElementById('date-num').textContent = now.getDate();
  }

  update();
  setInterval(update, 60000);
</script>
</body>
</html>
