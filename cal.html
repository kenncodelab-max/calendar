<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Calculator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: #191919;
    width: 100%;
    min-height: 100vh;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    font-family: -apple-system, 'Helvetica Neue', sans-serif;
  }

  .calc {
    width: 100%;
    max-width: 420px;
    padding: 0 12px 32px;
  }

  /* Display */
  .display {
    padding: 0 8px 12px;
    text-align: right;
  }
  .display .expr {
    font-size: 22px;
    font-weight: 300;
    color: #636366;
    min-height: 30px;
    word-break: break-all;
    margin-bottom: 4px;
  }
  .display .result {
    font-size: 80px;
    font-weight: 300;
    color: #ffffff;
    letter-spacing: -3px;
    line-height: 1;
    word-break: break-all;
  }
  .display .result.small { font-size: 52px; }
  .display .result.xsmall { font-size: 36px; }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
  }

  /* Buttons */
  .btn {
    height: 80px;
    border-radius: 50px;
    border: none;
    cursor: pointer;
    font-size: 32px;
    font-weight: 400;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: filter 0.08s ease;
    user-select: none;
    -webkit-user-select: none;
  }
  .btn:active { filter: brightness(1.35); }

  .btn.func  { background: #a5a5a5; color: #1c1c1e; }
  .btn.op    { background: #ff9f0a; color: #ffffff; }
  .btn.op.active { background: #ffffff; color: #ff9f0a; }
  .btn.num   { background: #333333; color: #ffffff; }
  .btn.zero  { grid-column: span 2; justify-content: flex-start; padding-left: 28px; border-radius: 50px; }

  @media (max-width: 380px) {
    .btn { height: 68px; font-size: 26px; }
    .display .result { font-size: 64px; }
  }
</style>
</head>
<body>
<div class="calc">
  <div class="display">
    <div class="expr" id="expr"></div>
    <div class="result" id="result">0</div>
  </div>

  <div class="grid">
    <button class="btn func" data-action="clear">AC</button>
    <button class="btn func" data-action="sign">+/−</button>
    <button class="btn func" data-action="percent">%</button>
    <button class="btn op"   data-action="op" data-op="÷">÷</button>

    <button class="btn num"  data-action="num" data-val="7">7</button>
    <button class="btn num"  data-action="num" data-val="8">8</button>
    <button class="btn num"  data-action="num" data-val="9">9</button>
    <button class="btn op"   data-action="op" data-op="×">×</button>

    <button class="btn num"  data-action="num" data-val="4">4</button>
    <button class="btn num"  data-action="num" data-val="5">5</button>
    <button class="btn num"  data-action="num" data-val="6">6</button>
    <button class="btn op"   data-action="op" data-op="−">−</button>

    <button class="btn num"  data-action="num" data-val="1">1</button>
    <button class="btn num"  data-action="num" data-val="2">2</button>
    <button class="btn num"  data-action="num" data-val="3">3</button>
    <button class="btn op"   data-action="op" data-op="+">+</button>

    <button class="btn num zero" data-action="num" data-val="0">0</button>
    <button class="btn num"  data-action="decimal">.</button>
    <button class="btn op"   data-action="equals">=</button>
  </div>
</div>

<script>
  let current = '0';
  let stored = null;
  let operator = null;
  let waitingForOperand = false;
  let justEvaled = false;

  const resultEl = document.getElementById('result');
  const exprEl   = document.getElementById('expr');

  function setDisplay(val) {
    const str = String(val);
    resultEl.className = 'result';
    if (str.length > 12) resultEl.classList.add('xsmall');
    else if (str.length > 9) resultEl.classList.add('small');
    resultEl.textContent = str;
  }

  function updateClearBtn() {
    const btn = document.querySelector('[data-action="clear"]');
    btn.textContent = (current === '0' && stored === null) ? 'AC' : 'C';
  }

  function calc(a, op, b) {
    a = parseFloat(a); b = parseFloat(b);
    if (op === '+') return a + b;
    if (op === '−') return a - b;
    if (op === '×') return a * b;
    if (op === '÷') return b !== 0 ? a / b : 'Error';
  }

  function fmt(n) {
    if (n === 'Error') return 'Error';
    let s = parseFloat(n.toPrecision(12));
    return String(s);
  }

  function handle(action, val, op) {
    if (action === 'num') {
      if (justEvaled) { current = val; justEvaled = false; }
      else if (waitingForOperand) { current = val; waitingForOperand = false; }
      else current = current === '0' ? val : (current.length < 12 ? current + val : current);
      setDisplay(current);

    } else if (action === 'decimal') {
      if (justEvaled) { current = '0.'; justEvaled = false; }
      else if (waitingForOperand) { current = '0.'; waitingForOperand = false; }
      else if (!current.includes('.')) current += '.';
      setDisplay(current);

    } else if (action === 'op') {
      justEvaled = false;
      if (stored !== null && !waitingForOperand) {
        const res = calc(stored, operator, current);
        current = fmt(res);
        stored = current;
      } else {
        stored = current;
      }
      operator = op;
      waitingForOperand = true;
      exprEl.textContent = stored + ' ' + op;
      setDisplay(current);
      document.querySelectorAll('.btn.op').forEach(b => b.classList.remove('active'));
      document.querySelector(`[data-op="${op}"]`).classList.add('active');

    } else if (action === 'equals') {
      if (stored !== null && operator) {
        exprEl.textContent = stored + ' ' + operator + ' ' + current + ' =';
        const res = calc(stored, operator, current);
        current = fmt(res);
        stored = null; operator = null;
        waitingForOperand = false;
        justEvaled = true;
        setDisplay(current);
        document.querySelectorAll('.btn.op').forEach(b => b.classList.remove('active'));
      }

    } else if (action === 'clear') {
      if (current !== '0' && !waitingForOperand) {
        current = '0';
      } else {
        current = '0'; stored = null; operator = null;
        waitingForOperand = false; justEvaled = false;
        exprEl.textContent = '';
        document.querySelectorAll('.btn.op').forEach(b => b.classList.remove('active'));
      }
      setDisplay(current);

    } else if (action === 'sign') {
      if (current !== '0') {
        current = current.startsWith('-') ? current.slice(1) : '-' + current;
        setDisplay(current);
      }

    } else if (action === 'percent') {
      current = fmt(parseFloat(current) / 100);
      setDisplay(current);
    }

    updateClearBtn();
  }

  document.querySelectorAll('.btn').forEach(btn => {
    btn.addEventListener('click', () => {
      handle(btn.dataset.action, btn.dataset.val, btn.dataset.op);
    });
  });

  setDisplay('0');
  updateClearBtn();
</script>
</body>
</html>
