<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pomodoro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1C1C1A;--card:#2A3328;--border:#3D4A39;
  --green:#4A7C59;--green-bright:#6DBF82;--green-text:#A8D5B5;
  --amber:#C4843A;--amber-text:#E8B97A;
  --text:#E8E4DC;--text-muted:#8A9E88;--text-dim:#5A6E58;--dot-empty:#2E3D2C;
}
html,body{height:100%;background:var(--bg);font-family:'DM Sans',sans-serif}
body{display:flex;align-items:center;justify-content:center}
.wrap{
  background:var(--bg);border-radius:14px;border:1px solid var(--border);
  padding:1.5rem 1.25rem 1.25rem;display:flex;flex-direction:column;
  align-items:center;width:320px;position:relative;overflow:hidden;
}
.wrap::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--green);opacity:0.8}
.header{display:flex;align-items:center;gap:8px;width:100%;margin-bottom:1.25rem}
.header svg{width:15px;height:15px;stroke:var(--amber-text);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.header-title{font-size:13px;font-weight:500;color:var(--text);letter-spacing:0.04em}
.tab-row{display:flex;background:#1A2019;border-radius:40px;padding:3px;margin-bottom:1.5rem;gap:2px;border:1px solid var(--border)}
.tab{font-family:'DM Sans',sans-serif;font-size:11px;padding:5px 14px;border-radius:40px;border:none;background:transparent;color:var(--text-muted);cursor:pointer;transition:all 0.2s;letter-spacing:0.05em}
.tab.active{background:var(--card);color:var(--green-text);border:1px solid var(--border)}
.phase-label{font-size:9px;letter-spacing:0.3em;text-transform:uppercase;color:var(--text-dim);margin-bottom:0.75rem;min-height:14px}
.flip-row{display:flex;align-items:center;gap:8px;margin-bottom:1.25rem}
.flip-card{display:flex;flex-direction:column;align-items:center}
.flip-digit{
  background:#111310;color:var(--text);font-family:'DM Mono',monospace;
  font-size:52px;font-weight:300;width:86px;height:80px;
  display:flex;align-items:center;justify-content:center;
  border-radius:10px;border:1px solid var(--border);transition:transform 0.07s ease;
}
.flip-digit.tick{transform:scaleY(0.91)}
.flip-label{font-size:9px;letter-spacing:0.22em;text-transform:uppercase;color:var(--text-dim);margin-top:5px}
.colon{font-family:'DM Mono',monospace;font-size:34px;font-weight:300;color:var(--border);margin-bottom:16px}
.prog-wrap{width:100%;height:3px;background:#1A2019;border-radius:4px;margin-bottom:1.25rem;overflow:hidden}
.prog-fill{height:3px;background:var(--green);border-radius:4px;width:0%;transition:width 0.6s linear}
.btn-row{display:flex;gap:8px;margin-bottom:1.25rem}
.btn{font-family:'DM Sans',sans-serif;font-size:12px;padding:7px 20px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text-muted);cursor:pointer;transition:all 0.18s;letter-spacing:0.04em}
.btn:hover{background:#324030;color:var(--text);border-color:var(--green)}
.btn:active{transform:scale(0.97)}
.btn.primary{background:var(--green);color:#E8F5EC;border-color:var(--green-bright)}
.btn.primary:hover{background:#3D6B4A}
.btn.ok{background:#2A3E2E;color:var(--green-text);border-color:var(--green);animation:pulse 1.8s infinite}
@keyframes pulse{0%,100%{border-color:var(--green)}50%{border-color:var(--green-bright)}}
.dots{display:flex;gap:7px;margin-bottom:6px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--dot-empty);transition:background 0.3s}
.dot.done{background:var(--green)}.dot.active{background:var(--amber)}
.status-log{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-dim);min-height:16px;letter-spacing:0.05em}
.break-wrap{position:absolute;inset:0;background:rgba(26,26,24,0.97);border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;opacity:0;pointer-events:none;transition:opacity 0.4s}
.break-wrap.on{opacity:1;pointer-events:all}
.break-title{font-size:22px;font-weight:300;color:var(--green-text)}
.break-sub{font-size:9px;letter-spacing:0.25em;text-transform:uppercase;color:var(--text-dim)}
.break-cd{font-family:'DM Mono',monospace;font-size:46px;font-weight:300;color:var(--text)}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    <span class="header-title">Pomodoro</span>
  </div>
  <div class="tab-row">
    <button class="tab active" id="tab-work" onclick="switchMode('work')">Work</button>
    <button class="tab" id="tab-short" onclick="switchMode('short')">Short break</button>
    <button class="tab" id="tab-long" onclick="switchMode('long')">Long break</button>
  </div>
  <div class="phase-label" id="phase-lbl">Focus</div>
  <div class="flip-row">
    <div class="flip-card"><div class="flip-digit" id="d-mm">25</div><div class="flip-label">Min</div></div>
    <div class="colon">:</div>
    <div class="flip-card"><div class="flip-digit" id="d-ss">00</div><div class="flip-label">Sec</div></div>
  </div>
  <div class="prog-wrap"><div class="prog-fill" id="prog"></div></div>
  <div class="btn-row">
    <button class="btn" onclick="resetTimer()">Reset</button>
    <button class="btn primary" id="btn-start" onclick="toggleTimer()">Start</button>
    <button class="btn" onclick="skipSession()">Skip</button>
  </div>
  <div class="dots" id="dot-row"></div>
  <div class="status-log" id="log"></div>
  <div class="break-wrap" id="break-wrap">
    <div class="break-title">Rest your mind</div>
    <div class="break-sub" id="break-sub">Short break · 5 min</div>
    <div class="break-cd" id="break-cd">05:00</div>
    <button class="btn ok" onclick="endBreak()">OK — back to work</button>
  </div>
</div>
<script>
const WORK=25*60,SHORT=5*60,LONG=15*60,SESSIONS=4;
const pad=n=>String(n).padStart(2,'0');
let rem=WORK,total=WORK,running=false,iv=null,sess=0,mode='work',brem=0,biv=null;
function render(){
  document.getElementById('d-mm').textContent=pad(Math.floor(rem/60));
  document.getElementById('d-ss').textContent=pad(rem%60);
  document.getElementById('prog').style.width=Math.max(0,(total-rem)/total*100).toFixed(1)+'%';
}
function renderDots(){
  const r=document.getElementById('dot-row');r.innerHTML='';
  for(let i=0;i<SESSIONS;i++){
    const d=document.createElement('div');
    d.className='dot'+(i<sess?' done':'')+(i===sess&&running&&mode==='work'?' active':'');
    r.appendChild(d);
  }
}
function log(m){document.getElementById('log').textContent=m}
function switchMode(m){
  if(running)return;mode=m;
  ['work','short','long'].forEach(t=>document.getElementById('tab-'+t).classList.remove('active'));
  document.getElementById('tab-'+m).classList.add('active');
  document.getElementById('phase-lbl').textContent={work:'Focus',short:'Short break',long:'Long break'}[m];
  total=m==='work'?WORK:m==='short'?SHORT:LONG;rem=total;
  document.getElementById('prog').style.background=m==='work'?'var(--green)':'var(--amber)';
  render();
}
function toggleTimer(){
  if(running){clearInterval(iv);running=false;document.getElementById('btn-start').textContent='Resume';log('Paused');}
  else{running=true;document.getElementById('btn-start').textContent='Pause';log('Session '+(sess+1)+' of '+SESSIONS);renderDots();iv=setInterval(tick,1000);}
}
function tick(){
  if(rem<=0){
    clearInterval(iv);running=false;
    if(mode==='work'){sess=Math.min(sess+1,SESSIONS);renderDots();log('Session '+sess+' complete');startBreak(sess%SESSIONS===0);}
    else{switchMode('work');document.getElementById('btn-start').textContent='Start';log('Break done — press Start');}
    return;
  }
  rem--;
  ['d-mm','d-ss'].forEach(id=>{const el=document.getElementById(id);el.classList.add('tick');setTimeout(()=>el.classList.remove('tick'),70);});
  render();
}
function resetTimer(){
  clearInterval(iv);clearInterval(biv);running=false;sess=0;
  document.getElementById('break-wrap').classList.remove('on');
  switchMode('work');document.getElementById('btn-start').textContent='Start';render();renderDots();log('');
}
function skipSession(){clearInterval(iv);running=false;rem=0;document.getElementById('btn-start').textContent='Start';tick();}
function startBreak(isLong){
  brem=isLong?LONG:SHORT;
  document.getElementById('break-sub').textContent=isLong?'Long break · 15 min':'Short break · 5 min';
  document.getElementById('break-wrap').classList.add('on');
  renderBcd();playBowl();
  biv=setInterval(()=>{if(brem<=0){clearInterval(biv);return;}brem--;renderBcd();},1000);
}
function renderBcd(){document.getElementById('break-cd').textContent=pad(Math.floor(brem/60))+':'+pad(brem%60);}
function endBreak(){
  clearInterval(biv);document.getElementById('break-wrap').classList.remove('on');
  if(sess>=SESSIONS)sess=0;switchMode('work');renderDots();
  document.getElementById('btn-start').textContent='Start';log('Ready — press Start');setTimeout(toggleTimer,300);
}
function playBowl(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const s=(f,t,d,g)=>{
      const o=ctx.createOscillator(),e=ctx.createGain(),fl=ctx.createBiquadFilter();
      fl.type='lowpass';fl.frequency.value=f*2.5;o.type='sine';
      o.frequency.setValueAtTime(f,t);o.frequency.exponentialRampToValueAtTime(f*0.996,t+d);
      e.gain.setValueAtTime(0,t);e.gain.linearRampToValueAtTime(g,t+0.01);
      e.gain.exponentialRampToValueAtTime(0.001,t+d);
      o.connect(fl);fl.connect(e);e.connect(ctx.destination);o.start(t);o.stop(t+d);
    };
    const n=ctx.currentTime;
    s(432,n,4.5,0.25);s(648,n+0.01,3.5,0.1);s(864,n+0.02,2.5,0.06);
    s(216,n,3.5,0.08);s(432,n+3,5,0.15);s(324,n+3.01,4,0.07);
  }catch(e){}
}
render();renderDots();
</script>
</body>
</html>
